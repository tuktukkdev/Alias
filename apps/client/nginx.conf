server {
    listen 80;
    server_name bluefieldapps.com www.bluefieldapps.com;

    root /usr/share/nginx/html;
    index index.html;

    # WebSocket (must be before generic proxy block)
    location /ws {
        proxy_pass http://server:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # API + file uploads — proxy to Node.js server
    location ~ ^/(auth|rooms|default-collections|collections|friends|uploads)(/.*)?$ {
        proxy_pass http://server:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 5m;
    }

    # SPA — serve index.html for all other routes
    location / {
        try_files $uri /index.html;
    }
}
