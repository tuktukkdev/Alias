# это скрипт для деплоя на сервер линукс
name: Deploy to VPS
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        with:
          host: 92.255.79.21
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: POSTGRES_PASSWORD,RESEND_API_KEY,EMAIL_FROM
          script: |
            cd ~/Alias/apps
            git fetch origin main
            git reset --hard origin/main
            # Write .env from CI secrets (idempotent — recreates it every deploy)
            printf 'POSTGRES_PASSWORD=%s\nRESEND_API_KEY=%s\nEMAIL_FROM=%s\n' \
              "$POSTGRES_PASSWORD" "$RESEND_API_KEY" "$EMAIL_FROM" > .env
            # Rebuild and restart only app containers.
            # postgres and redis keep running — volumes (pgdata, uploads) are untouched.
            docker compose up -d --build server client
            # Remove dangling images to free disk space
            docker image prune -f
